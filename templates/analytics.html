{# templates/analytics.html #}
{% extends "base.html" %}

{% block title %}Analytics — Spendly{% endblock %}

{% block head %}
<style>
.analytics-soon {
    min-height: calc(100vh - 60px - 100px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-2);
}

.analytics-soon-title {
    font-family: var(--font-display);
    font-size: clamp(2.5rem, 6vw, 4rem);
    color: var(--paper);
    text-align: center;
    line-height: 1.2;
    letter-spacing: -0.01em;
}
</style>
{% endblock %}

{% block content %}
<div class="analytics-soon">
    <h1 class="analytics-soon-title">Analytics Coming Soon</h1>
</div>
{% endblock %}
